name: DogOps CI CD Pipeline

on:
  push:
    branches:
      - "master"
      - "feature/**"
    tags:
      - "v*.*.*"
  pull_request:
    branches:
      - "master"

jobs:
  # Backend build and lint pipeline
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Check out repository code
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pylint
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Run Code Lint
      run: |
        pylint --errors-only .

    - name: Build Docker Image (Local Test)
      run: |
        docker build -t devops-dogops-backend:local-test .

    - name: Configure AWS credentials
      if: github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v')
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1

    - name: Login to Amazon ECR
      if: github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v')
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build, tag, and push image to Amazon ECR
      if: github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v')
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        ECR_REPOSITORY: devops-dogops-backend
      run: |
        if [ "${{ startsWith(github.ref, 'refs/tags/v') }}" = "true" ]; then
          IMAGE_TAG="${{ github.ref_name }}"
        else
          IMAGE_TAG="${{ github.sha }}"
        fi
        
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

  # Frontend build and deploy pipeline
  build-and-push-frontend:
    name: Frontend CI (Build & Push)
    runs-on: ubuntu-latest

    steps:
    - name: Check out repository code
      uses: actions/checkout@v4

    - name: Build Docker Image (Local Test)
      run: |
        docker build -t devops-dogops-frontend:local-test ./frontend

    - name: Configure AWS credentials
      if: github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v')
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1

    - name: Login to Amazon ECR
      if: github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v')
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build, tag, and push image to Amazon ECR
      if: github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v')
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        ECR_REPOSITORY: devops-dogops-frontend
      run: |
        if [ "${{ startsWith(github.ref, 'refs/tags/v') }}" = "true" ]; then
          IMAGE_TAG="${{ github.ref_name }}"
        else
          IMAGE_TAG="${{ github.sha }}"
        fi
        
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG ./frontend
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG